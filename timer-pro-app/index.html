<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Timer Pro App</title>
    <link rel="stylesheet" href="shared/css/base.css" />
    <link rel="stylesheet" href="index.css" />
    <link rel="stylesheet" href="shared/css/theme.css" />
</head>

<body>
    <main class="container home-wrap">
        <section class="card home-card">
            <div class="home-head">
                <span class="pill">Timer Pro App</span>
                <h1>Cargar tiempos</h1>
                <p class="muted">Selecciona el metodo de carga.</p>
            </div>

            <div class="home-actions">
                <button id="btnCronometro" class="btn primary">Cronometro interno</button>
                <button id="btnCargaExterna" class="btn primary">Cargar CSV externo</button>
            </div>

            <hr class="home-divider">

            <div class="home-actions">
                <button id="btnListaNadadores" class="btn light">Lista de nadadores</button>
            </div>
        </section>
    </main>

    <script src="shared/js/theme.js"></script>
    <script src="shared/js/navigation.js"></script>
    <script src="index.js"></script>
</body>

</html>
