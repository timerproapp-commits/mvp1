<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nado • Carga Externa</title>
    <link rel="stylesheet" href="../../shared/css/base.css" />
    <link rel="stylesheet" href="./carga-externa.css" />
    <link rel="stylesheet" href="../../shared/css/theme.css" />
</head>

<body>
    <!--
            PANTALLA DE CARGA EXTERNA
            Recibe texto exportado desde Multi Timer.
            ABAP analogia: upload/copy-paste a zona de staging antes de validacion final.
        -->
    <main class="container">
        <section class="step">
            <div class="step-head">
                <span class="badge">CARGA EXTERNA</span>
                <div class="subtitle">Pegá bloques de Multi Timer</div>
            </div>
            <div class="step-body">
                <!-- Input principal de datos crudos -->
                <textarea id="txtRaw" placeholder="Pega aqui..."></textarea>
                <button id="btnLoad" class="btn primary" style="margin-top: 15px;">⬆️ Cargar tiempos</button>
                <button id="btnBack" class="btn light" style="margin-top: 10px;">← Volver al inicio</button>
                <!-- Mensajes de validacion y estado -->
                <div id="status" class="help" style="margin-top: 10px; text-align: center;"></div>
            </div>
        </section>
    </main>

    <script src="../../shared/js/theme.js"></script>
    <script src="../../shared/js/navigation.js"></script>
    <script src="./carga-externa.js"></script>
</body>

</html>
