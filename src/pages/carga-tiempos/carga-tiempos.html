<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nado • App</title>
  <link rel="stylesheet" href="../../shared/css/base.css" />
  <link rel="stylesheet" href="./carga-tiempos.css" />
</head>

<body>

  <main class="container">

    <div id="view-carga" class="view active">
      <section class="result" style="margin-top: 20px;">
        <div class="result-head">
          <span class="badge">REVISION</span>
          <div class="subtitle">Revisión de precarga</div>
          <div class="help" style="font-size: 0.85rem; text-align: center;">Cronómetro finalizado</div>
        </div>
        <div class="result-body">
          <div id="summaryBody"></div>
          <div class="share-actions">
            <button id="btnCopySummary" class="btn light">📋 Copiar resumen</button>
            <button id="btnDownloadSummary" class="btn light">⬇️ Descargar TXT</button>
          </div>
          <div id="status" class="help" style="margin-top: 10px; text-align: center;"></div>
        </div>
        <button id="btnConfirm" class="btn primary" style="margin-top: 10px; background: #28a745;">✅ Confirmar y
          Guardar</button>
        <button id="btnNewLoad" class="btn primary" style="margin-top: 10px; display: none;">Cargar nuevos
          tiempos</button>
      </section>

    </div>

  </main>

  <div class="modal" id="modal">
    <div class="modal-card">
      <div class="modal-head">
        <div id="modalTitle" style="font-weight: 800;">Detalles</div>
        <button class="btn light" id="btnClose" style="width: auto; padding: 5px 15px;">Cerrar</button>
      </div>
      <div class="modal-body">
        <table style="width: 100%; border-collapse: collapse;">
          <thead>
            <tr>
              <th>#</th>
              <th>Tiempo</th>
              <th>Vuelta</th>
            </tr>
          </thead>
          <tbody id="modalTbody" style="text-align: center;"></tbody>
        </table>
        <div id="metrics"></div>
      </div>
    </div>
  </div>

  <script src="../../shared/js/navigation.js"></script>
  <script src="./carga-tiempos.js"></script>
</body>

</html>
