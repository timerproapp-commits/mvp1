<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>SwimCoach Pro - Final UI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="./cronometro.css">
    <link rel="stylesheet" href="../../shared/css/theme.css" />

</head>

<body>

    <!--
            SETUP PREVIO A LA CARRERA
            ABAP analogia: parametros obligatorios antes de ejecutar START-OF-SELECTION.
        -->
    <div id="setup" class="setup-zone">
        <h2 class="setup-title">Configurar cronometro</h2>
        <div id="race-preview" class="setup-race-preview">--m --</div>
        <div class="setup-form">
            <div class="setup-field">
                <label>Estilo *</label>
                <div class="chip-row" id="style-row">
                    <button type="button" class="setup-chip" data-style="Mariposa">Mariposa</button>
                    <button type="button" class="setup-chip" data-style="Espalda">Espalda</button>
                    <button type="button" class="setup-chip" data-style="Pecho">Pecho</button>
                    <button type="button" class="setup-chip" data-style="Libre">Libre</button>
                    <button type="button" class="setup-chip" data-style="Otro">Otro</button>
                </div>
                <input type="text" id="race-style-other" class="setup-inline-input" placeholder="Otro estilo (max 10)"
                    maxlength="10" style="display:none;">
                <input type="hidden" id="race-style" value="">
            </div>

            <div class="setup-field">
                <label>Distancia *</label>
                <div class="chip-row" id="distance-row">
                    <button type="button" class="setup-chip" data-distance="25">25</button>
                    <button type="button" class="setup-chip" data-distance="50">50</button>
                    <button type="button" class="setup-chip" data-distance="75">75</button>
                    <button type="button" class="setup-chip" data-distance="100">100</button>
                    <button type="button" class="setup-chip" data-distance="125">125</button>
                    <button type="button" class="setup-chip" data-distance="150">150</button>
                    <button type="button" class="setup-chip" data-distance="200">200</button>
                    <button type="button" class="setup-chip" data-distance="400">400</button>
                    <button type="button" class="setup-chip" data-distance="800">800</button>
                    <button type="button" class="setup-chip" data-distance="1500">1500</button>
                    <button type="button" class="setup-chip" data-distance="other">Otra distancia</button>
                </div>
                <input type="number" id="race-distance-other" class="setup-inline-input" placeholder="Ej: 20" min="1"
                    max="999999" step="1" style="display:none;">
                <input type="hidden" id="race-distance" value="">
            </div>

            <div class="setup-field setup-count-wrap">
                <label for="num-swimmers">Cantidad de nadadores *</label>
                <div class="count-selector">
                    <button type="button" id="count-minus" class="count-btn" aria-label="Disminuir">-</button>
                    <input type="number" id="num-swimmers" min="1" max="10" step="1" value="7" required>
                    <button type="button" id="count-plus" class="count-btn" aria-label="Aumentar">+</button>
                </div>
            </div>

            <div class="setup-field setup-disabled-area">
                <label>Modo (proximamente)</label>
                <div class="setup-switch-row is-disabled">
                    <button type="button" class="setup-chip" disabled>Entrenamiento</button>
                    <button type="button" class="setup-chip" disabled>Torneo</button>
                </div>
                <input type="text" class="setup-inline-input" placeholder="Complete el nombre del club/torneo" disabled>
                <input type="date" id="event-date-placeholder" class="setup-inline-input" disabled>
            </div>
        </div>
        <div id="setup-error" class="setup-error" aria-live="polite"></div>
        <div class="setup-actions">
            <button class="btn-start-global" onclick="initRace()">PREPARAR</button>
            <button class="btn-start-global" id="btnVolverSetup" onclick="goToHome()"
                style="background:#333; margin-top:8px;">← Volver al inicio</button>
        </div>
    </div>

    <!--
            CABECERA DE CARRERA EN EJECUCION
            Muestra metadatos + reloj principal + menu contextual.
        -->
    <div class="header" id="header-ui" style="display:none;">
        <div id="race-name" class="race-name">Carrera N/D</div>
        <div id="main-clock">00:00.00</div>
        <div class="menu-container">
            <button class="dots-btn" onclick="toggleMenu()">⋮</button>
            <div class="dropdown" id="myDropdown">
                <button onclick="goToTimerProAnalisis()">Timer Pro Analisis</button>
                <button onclick="downloadCSV()">Exportar CSV</button>
                <button onclick="resetCronoState()" style="color: #ff5252;">Reiniciar Todo</button>
            </div>
        </div>
    </div>

    <!-- Bloque donde vive el boton global START -->
    <div id="run-controls" style="display:none; padding: 10px;">
        <button class="btn-start-global" onclick="startGlobalTimer()">¡START!</button>
    </div>

    <!-- Contenedor dinamico de carriles/nadadores -->
    <div class="lanes-grid" id="lanes-container"></div>

    <!-- Alta de carriles permitida solo antes de START -->
    <div class="add-swimmer-wrap" id="add-swimmer-wrap" style="display:none;">
        <button class="btn-add-swimmer" id="btn-add-swimmer" onclick="addSwimmer()">+ Agregar nadador</button>
    </div>

    <!-- Modal: confirmar salida hacia analisis -->
    <div id="confirm-analisis-modal"
        style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:3000; align-items:center; justify-content:center; padding:16px;">
        <div
            style="width:100%; max-width:360px; background:#1d1d1d; border:1px solid #3f3f3f; border-radius:12px; padding:14px; color:#fff;">
            <div style="font-size:1rem; font-weight:700; margin-bottom:8px;">Abandonar el cronometro y ver resultados
            </div>
            <div style="font-size:0.9rem; color:#d0d0d0; margin-bottom:12px;">Si continuas, esta carrera quedara
                finalizada y no podras volver al cronometro.</div>
            <div style="display:flex; gap:8px;">
                <button id="btnConfirmNo"
                    style="flex:1; border:none; border-radius:8px; padding:10px; font-weight:700; background:#3a3a3a; color:#fff;">NO</button>
                <button id="btnConfirmSi"
                    style="flex:1; border:none; border-radius:8px; padding:10px; font-weight:700; background:#00a95a; color:#fff;">SI</button>
            </div>
        </div>
    </div>

    <!-- Modal: confirmar reinicio por refresh/F5 -->
    <div id="confirm-refresh-modal" class="confirm-refresh-modal" aria-hidden="true">
        <div class="confirm-refresh-card" role="dialog" aria-modal="true" aria-labelledby="refreshModalTitle">
            <div id="refreshModalTitle" class="confirm-refresh-title">Atencion</div>
            <div class="confirm-refresh-text">
                Si refrescas esta pagina, la carrera actual se reiniciara y se perderan todos los tiempos no guardados.
            </div>
            <div class="confirm-refresh-actions">
                <button id="btnRefreshReset" class="confirm-refresh-btn danger">OK = Reiniciar sin guardar</button>
                <button id="btnRefreshCancel" class="confirm-refresh-btn safe">Cancel = Volver a la carrera</button>
            </div>
        </div>
    </div>

    <script src="../../shared/js/theme.js"></script>
    <script src="../../shared/js/navigation.js"></script>
    <script src="./cronometro.js"></script>
</body>

</html>
